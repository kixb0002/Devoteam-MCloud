name: Deploy Azure Failover Orchestrator

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "azure-failover-orchestrator/**"
      - ".github/workflows/deploy-azure-failover-orchestrator.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: azure-failover-orchestrator/infra
    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.AZURE_LOCATION }}
      TF_VAR_storage_account_name: ${{ vars.STORAGE_ACCOUNT_NAME }}
      TF_VAR_function_app_name: ${{ vars.FUNCTION_APP_NAME }}
      TF_VAR_primary_endpoint: ${{ vars.PRIMARY_ENDPOINT }}
      TF_VAR_secondary_endpoint: ${{ vars.SECONDARY_ENDPOINT }}
      TF_VAR_cooldown_minutes: ${{ vars.COOLDOWN_MINUTES }}
      TF_VAR_logicapp_interval_minutes: ${{ vars.LOGICAPP_INTERVAL_MINUTES }}
      TF_VAR_functions_zip_path: ../functions.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Build functions package
        working-directory: azure-failover-orchestrator/functions
        run: |
          zip -r ../functions.zip .

      - name: Terraform init
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}" \
            -backend-config="key=${{ vars.TFSTATE_KEY }}"

      - name: Terraform apply pass 1
        env:
          TF_VAR_health_function_key: TEMP
          TF_VAR_failover_function_key: TEMP
        run: terraform apply -auto-approve -input=false

      - name: Fetch function keys
        env:
          RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
          FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
        run: |
          get_key() {
            local function_name="$1"
            local attempts=12
            local sleep_seconds=20
            local key=""

            for ((i=1; i<=attempts; i++)); do
              key=$(az functionapp function keys list \
                --resource-group "$RESOURCE_GROUP_NAME" \
                --name "$FUNCTION_APP_NAME" \
                --function-name "$function_name" \
                --query default \
                --output tsv 2>/dev/null || true)

              if [[ -n "$key" && "$key" != "null" ]]; then
                echo "$key"
                return 0
              fi

              echo "Attempt $i/$attempts: key for $function_name not ready yet. Waiting ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            done

            return 1
          }

          echo "Waiting for Azure Functions to finish startup before retrieving keys..."
          sleep 30

          HEALTH_KEY=$(get_key health_check)
          FAILOVER_KEY=$(get_key do_failover)

          if [[ -z "$HEALTH_KEY" || -z "$FAILOVER_KEY" ]]; then
            echo "Function keys could not be retrieved after multiple attempts." >&2
            exit 1
          fi

          {
            echo "TF_VAR_health_function_key=$HEALTH_KEY"
            echo "TF_VAR_failover_function_key=$FAILOVER_KEY"
          } >> "$GITHUB_ENV"

      - name: Terraform apply pass 2
        run: terraform apply -auto-approve -input=false

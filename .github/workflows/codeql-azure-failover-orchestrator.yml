name: CodeQL - Azure Failover Orchestrator

on:
  pull_request:
    paths:
      - "azure-failover-orchestrator/functions/**"
      - ".github/workflows/codeql-azure-failover-orchestrator.yml"
  push:
    branches:
      - main
    paths:
      - "azure-failover-orchestrator/functions/**"
      - ".github/workflows/codeql-azure-failover-orchestrator.yml"
  schedule:
    - cron: "15 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ "python" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
